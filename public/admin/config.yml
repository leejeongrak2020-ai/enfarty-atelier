backend:
  name: github
  repo: leejeongrak2020-ai/enfarty-atelier
  branch: main
  base_url: https://decapbridge.com

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "페이지 내용 관리"
    files:
      - label: "메인 페이지 (작품전)"
        name: "main"
        file: "public/data/main.json"
        fields:
          - {label: "페이지 제목", name: "title", widget: "string"}
          - label: "작품 리스트", name: "items", widget: "list", fields:
            - {label: "작품명", name: "title", widget: "string"}
            - {label: "사진", name: "image", widget: "image"}
            - {label: "설명", name: "desc", widget: "string"}

      - label: "커리큘럼 페이지"
        name: "curriculum"
        file: "public/data/curriculum.json"
        fields:
          - {label: "상단 제목", name: "title", widget: "string"}
          - {label: "설명 문구", name: "subtitle", widget: "text"}
          - label: "프로그램 목록", name: "programs", widget: "list", fields:
            - {label: "프로그램명", name: "name", widget: "string"}
            - {label: "대표 사진", name: "image", widget: "image"}
            - {label: "대상 연령", name: "target", widget: "string"}
            - {label: "상세 내용", name: "details", widget: "text"}

      - label: "수업 시간표"
        name: "schedule"
        file: "public/data/schedule.json"
        fields:
          - {label: "시간표 이미지", name: "table_image", widget: "image"}
          - {label: "예약 링크 (카카오톡 등)", name: "booking_link", widget: "string"}

      - label: "사이트 공통 설정 (푸터/문의)"
        name: "global"
        file: "public/data/global.json"
        fields:
          - {label: "카카오톡 채널 링크", name: "kakao_link", widget: "string"}
          - {label: "학원 주소", name: "address", widget: "string"}
          - {label: "상담 전화번호", name: "phone", widget: "string"}
