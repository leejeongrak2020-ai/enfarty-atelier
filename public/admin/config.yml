backend:
  name: github
  repo: leejeongrak2020-ai/enfarty-atelier
  branch: main
  # api. 이 반드시 포함된 아래 주소가 '로그인 사무실'의 진짜 주소입니다.
  base_url: https://api.decapbridge.com

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "atelier_config"
    label: "작품 관리"
    files:
      - label: "작품 리스트"
        name: "products"
        file: "public/data/products.json"
        fields:
          - label: "작품 목록"
            name: "items"
            widget: "list"
            fields:
              - {label: "작품명", name: "title", widget: "string"}
              - {label: "사진 업로드", name: "image", widget: "image"}
              - {label: "작품 설명", name: "desc", widget: "string"}
