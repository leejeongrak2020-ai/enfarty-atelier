backend:
  name: github
  repo: leejeongrak2020-ai/enfarty-atelier
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "items"
    label: "작품 관리"
    file: "public/data/products.json"
    fields:
      - label: "작품 리스트"
        name: "items"
        widget: "list"
        fields:
          - {label: "작품명", name: "title", widget: "string"}
          - {label: "사진", name: "image", widget: "image"}
          - {label: "설명", name: "desc", widget: "string"}
